spring.application.name=Quotation
spring.profiles.active=local
server.port=${SERVER_PORT:8080}

# Debug logging for auth issues
logging.level.com.satyam.quotation=DEBUG
logging.level.org.springframework.security=DEBUG

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=satyamchintewar@gmail.com
spring.mail.password=bbqp yfec oglw sqey
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=satyamchintewar@gmail.com
app.mail.from-name=Quotation System
app.mail.enabled=true

jwt.secret=VERY_SECRET_KEY_1234567890_CHANGE_IN_PRODUCTION
jwt.access-token-expiry=3600000
jwt.refresh-token-expiry=604800000

file.upload-dir=./uploads/quotations

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.task.scheduling.pool.size=5
app.scheduler.expiry-warning-days=3
app.scheduler.expiry-check-cron=0 0 9 * * ?